<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票技術分析儀｜台股 + 美股</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--border:#1e2d45;--accent:#00d4ff;--accent2:#0066ff;--green:#00e676;--red:#ff1744;--yellow:#ffd740;--text:#e2e8f0;--text2:#94a3b8;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:24px 16px;}

  /* Header */
  .header{text-align:center;margin-bottom:24px;}
  .header h1{font-size:clamp(20px,4vw,30px);font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .header .sub{color:var(--text2);font-size:12px;margin-top:6px;line-height:1.6;}
  .header .disclaimer{font-size:11px;color:#64748b;margin-top:4px;}

  /* 搜尋 */
  .search-box{display:flex;flex-direction:column;gap:8px;max-width:480px;margin:0 auto 16px;}
  @media(min-width:480px){.search-box{flex-direction:row;}}
  .search-box input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px 16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;outline:none;transition:border-color .2s;min-height:44px;}
  .search-box input:focus{border-color:var(--accent);}
  .search-box input::placeholder{color:var(--text2);}
  .search-box button{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:8px;padding:13px 24px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap;min-height:44px;}
  .search-box button:hover{opacity:.85;}
  .search-box button:disabled{opacity:.5;cursor:not-allowed;}

  /* 市場標籤 */
  .market-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
  .tab-label{font-size:11px;color:var(--text2);padding:3px 12px;border-radius:20px;border:1px solid var(--border);}
  .tab-label.tw{border-color:rgba(255,23,68,.3);color:var(--red);}
  .tab-label.us{border-color:rgba(0,212,255,.3);color:var(--accent);}
  .tab-label.active-tw{background:rgba(255,23,68,.12);border-color:var(--red);}
  .tab-label.active-us{background:rgba(0,212,255,.12);border-color:var(--accent);}

  /* 快捷按鈕 */
  .quick-group{margin-bottom:24px;}
  .quick-group-label{text-align:center;font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .quick-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .quick-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;min-height:36px;}
  .quick-btn.tw:hover{border-color:var(--red);color:var(--red);}
  .quick-btn.us:hover{border-color:var(--accent);color:var(--accent);}

  #result{max-width:960px;margin:0 auto;}

  /* 狀態 */
  .loading{text-align:center;padding:48px;color:var(--text2);font-size:14px;}
  .loading::after{content:'';display:block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:16px auto 0;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-msg{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.3);border-radius:var(--radius);padding:16px 20px;color:var(--red);text-align:center;line-height:1.6;}

  /* 卡片 */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .section-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}

  /* 市場徽章 */
  .market-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;margin-left:8px;}
  .market-badge.tw{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.25);}
  .market-badge.us{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.25);}

  /* 股價主卡 */
  .price-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
  .stock-name{font-size:20px;font-weight:700;}
  .stock-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:4px;}
  .price-main{font-family:'JetBrains Mono',monospace;font-size:clamp(26px,5vw,40px);font-weight:600;line-height:1;margin:6px 0;}
  .currency-tag{font-size:13px;font-weight:400;color:var(--text2);margin-left:4px;}
  .price-change{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;}
  .data-note{font-size:10px;color:#64748b;margin-top:6px;}
  .up{color:var(--red);}.down{color:var(--green);}.flat{color:var(--text2);}
  .us-up{color:var(--green);}.us-down{color:var(--red);}
  .price-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .meta-item label{font-size:10px;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:3px;}
  .meta-item span{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;}

  /* 均線 */
  .ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
  .ind-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;}
  .ind-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:5px;}
  .ind-item span{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
  .ind-item .sub{font-size:10px;color:var(--text2);margin-top:3px;}
  .ma-position{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .ma-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
  .ma-tag.above{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2);}
  .ma-tag.below{background:rgba(148,163,184,.08);color:var(--text2);border:1px solid rgba(148,163,184,.2);}

  /* 訊號 */
  .signal-card{border-left:4px solid var(--accent);}
  .signal-card.bullish{border-left-color:var(--accent);}
  .signal-card.bearish{border-left-color:rgba(148,163,184,.4);}
  .signal-card.neutral{border-left-color:var(--yellow);}
  .signal-score{display:flex;gap:12px;margin-bottom:8px;}
  .score-bull{font-size:13px;color:var(--accent);font-weight:600;}
  .score-bear{font-size:13px;color:var(--text2);font-weight:600;}
  .signal-summary{font-size:17px;font-weight:700;margin-bottom:12px;}
  .signal-items{display:flex;flex-direction:column;gap:6px;}
  .signal-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;}
  .signal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .sig-bullish .signal-dot{background:var(--accent);}
  .sig-bearish .signal-dot{background:var(--text2);}
  .sig-neutral .signal-dot{background:var(--yellow);}

  /* 估值 */
  .val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
  .val-item{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);}
  .val-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px;}
  .val-item span{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}
  .val-na{color:var(--text2);font-size:13px;}

  /* AI 決策儀表盤 */
  .buy-zone-card{background:var(--bg2);border:1px solid rgba(0,212,255,.2);border-radius:var(--radius);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
  .buy-zone-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .bz-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .ai-badge{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:1px;}
  .bz-title{font-size:13px;color:var(--text2);}
  .entry-quality{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .eq-excellent{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.3);}
  .eq-good{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25);}
  .eq-fair{background:rgba(255,215,64,.12);color:var(--yellow);border:1px solid rgba(255,215,64,.25);}
  .eq-poor{background:rgba(148,163,184,.12);color:var(--text2);border:1px solid rgba(148,163,184,.25);}
  .verdict-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 14px;background:var(--bg3);border-radius:10px;}
  .verdict-main{display:flex;align-items:center;gap:10px;}
  .verdict-icon{font-size:18px;}
  .verdict-label{font-size:16px;font-weight:700;}
  .verdict-score{text-align:right;}
  .score-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;}
  .score-label{font-size:11px;color:var(--text2);margin-left:2px;}
  .bz-bias-warn{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px;}
  .bz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
  .bz-item{background:var(--bg3);border-radius:8px;padding:12px;border:1px solid var(--border);}
  .bz-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:5px;}
  .bz-item span{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;}
  .bz-item.buy span{color:var(--accent);}
  .bz-item.stop span{color:#94a3b8;}
  .bz-item.t6 span{color:#a8edea;}
  .bz-item.t12 span{color:var(--green);}
  .checklist-title{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;}
  .checklist{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .cl-item{display:grid;grid-template-columns:22px 1fr auto;align-items:start;gap:6px;font-size:12px;padding:6px 10px;background:var(--bg3);border-radius:6px;}
  .cl-icon{font-size:12px;}
  .cl-name{font-weight:500;}
  .cl-note{color:var(--text2);font-size:11px;text-align:right;}
  .bz-strategy{font-size:12px;color:var(--text);line-height:1.7;padding:10px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent2);margin-bottom:10px;}
  .bz-reason{font-size:11px;color:var(--text2);line-height:1.6;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:10px;}
  .bz-wait{font-size:11px;color:var(--yellow);padding:8px 12px;background:rgba(255,215,64,.06);border-radius:8px;border:1px solid rgba(255,215,64,.2);margin-bottom:10px;}
  .factors-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
  @media(max-width:480px){.factors-grid{grid-template-columns:1fr;}}
  .factors-col{display:flex;flex-direction:column;gap:5px;}
  .factor-item{font-size:11px;padding:6px 10px;border-radius:6px;line-height:1.5;}
  .risk-item{background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.15);}
  .cat-item{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.15);}
  .risk-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
  .risk-low{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
  .risk-medium{background:rgba(255,215,64,.12);color:var(--yellow);border:1px solid rgba(255,215,64,.3);}
  .risk-high{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.3);}
  .ai-loading{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;padding:8px 0;}
  .ai-loading::before{content:'';width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}

  /* 圖表 */
  .chart-area{position:relative;height:200px;margin-top:8px;}
  .chart-area.small{height:90px;}
  canvas{width:100%!important;max-width:100%;}
  .chart-info{font-size:10px;color:var(--text2);margin-top:4px;}

  /* 月營收 */
  .rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
  .rev-item{background:var(--bg3);border-radius:8px;padding:12px;}
  .rev-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;}
  .rev-item span{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;}
  .rev-na{color:var(--text2);font-size:12px;}

  /* 新聞 */
  .news-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .news-loading{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:12px;}
  .news-loading::before{content:'';width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
  .news-list{display:flex;flex-direction:column;gap:10px;}
  .news-item{padding:10px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--border);transition:border-color .2s;}
  .news-item:hover{border-left-color:var(--accent);}
  .news-item a{color:var(--text);text-decoration:none;font-size:13px;font-weight:500;line-height:1.5;display:block;margin-bottom:4px;}
  .news-item a:hover{color:var(--accent);}
  .news-meta{display:flex;gap:8px;font-size:10px;color:var(--text2);}
  .news-source{color:var(--accent);font-weight:500;}
  .news-snippet{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;}
  .news-empty{color:var(--text2);font-size:12px;text-align:center;padding:12px 0;}
  .news-date{color:var(--text2);font-size:10px;background:var(--bg2);padding:1px 6px;border-radius:10px;}


  .updated-tag{font-size:10px;color:var(--text2);text-align:right;margin-top:4px;}
  footer{text-align:center;margin-top:40px;color:#64748b;font-size:11px;line-height:2;}
</style>
</head>
<body>
<div class="header">
  <h1>股票技術分析儀</h1>
  <div class="sub">台股 + 美股｜中長期技術面分析｜AI 輔助進場風險評估</div>
  <div class="disclaimer">適合中長線趨勢觀察，不適合作為即時交易決策依據</div>
</div>

<div class="search-box">
  <input id="stockInput" type="text" placeholder="台股代號 2330 或美股 AAPL"
    maxlength="10" oninput="detectMarket()" onkeydown="if(event.key==='Enter')analyze()">
  <button id="searchBtn" onclick="analyze()">分析</button>
</div>

<div class="market-tabs">
  <span id="tab-tw" class="tab-label tw">🇹🇼 台股</span>
  <span id="tab-us" class="tab-label us">🇺🇸 美股</span>
</div>

<div class="quick-group">
  <div class="quick-group-label">🇹🇼 台股</div>
  <div class="quick-btns">
    <button class="quick-btn tw" onclick="quickSearch('2330')">2330 台積電</button>
    <button class="quick-btn tw" onclick="quickSearch('2317')">2317 鴻海</button>
    <button class="quick-btn tw" onclick="quickSearch('2454')">2454 聯發科</button>
    <button class="quick-btn tw" onclick="quickSearch('2412')">2412 中華電</button>
    <button class="quick-btn tw" onclick="quickSearch('0050')">0050 元大50</button>
  </div>
</div>
<div class="quick-group">
  <div class="quick-group-label">🇺🇸 美股</div>
  <div class="quick-btns">
    <button class="quick-btn us" onclick="quickSearch('AAPL')">AAPL 蘋果</button>
    <button class="quick-btn us" onclick="quickSearch('NVDA')">NVDA 輝達</button>
    <button class="quick-btn us" onclick="quickSearch('MSFT')">MSFT 微軟</button>
    <button class="quick-btn us" onclick="quickSearch('SPY')">SPY 標普500</button>
    <button class="quick-btn us" onclick="quickSearch('QQQ')">QQQ 那斯達克</button>
  </div>
</div>

<div id="result"></div>

<footer>
  台股資料：FinMind｜美股資料：Yahoo Finance｜AI 分析：Claude (Anthropic)｜新聞：Tavily<br>
  資料依各來源更新頻率為準，可能非即時報價｜技術指標：MA20/60/120/240・MACD・月KD・RSI・本益比・殖利率<br>
  本工具僅供技術面參考，不構成任何投資建議，投資人應自行判斷風險
</footer>

<script>
let priceChart=null, macdChart=null;

function detectMarket(){
  const v=document.getElementById('stockInput').value.trim();
  document.getElementById('tab-tw').className='tab-label tw'+(/^\d/.test(v)?' active-tw':'');
  document.getElementById('tab-us').className='tab-label us'+(/^[A-Za-z]/.test(v)?' active-us':'');
}

function quickSearch(id){document.getElementById('stockInput').value=id;detectMarket();analyze();}
function isUS(v){return /^[A-Za-z]/.test(v.trim());}

async function analyze(){
  const raw=document.getElementById('stockInput').value.trim();
  const btn=document.getElementById('searchBtn'),result=document.getElementById('result');

  // 輸入驗證
  if(!raw){result.innerHTML='<div class="error-msg">請輸入股票代號，例如台股 2330 或美股 AAPL</div>';return;}

  btn.disabled=true;btn.textContent='分析中…';
  result.innerHTML='<div class="loading">正在取得市場資料</div>';
  if(priceChart){priceChart.destroy();priceChart=null;}
  if(macdChart){macdChart.destroy();macdChart=null;}

  try{
    const us=isUS(raw);
    const endpoint=us?`/api/us-analyze?symbol=${encodeURIComponent(raw.toUpperCase())}`:
                      `/api/analyze?stock_id=${encodeURIComponent(raw)}`;
    const res=await fetch(endpoint);
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'資料暫時無法取得，請稍後再試');
    renderResult(data);
    fetchAIZone(data);
    fetchNews(data);
  }catch(e){
    result.innerHTML=`<div class="error-msg">⚠️ ${e.message}</div>`;
  }finally{btn.disabled=false;btn.textContent='分析';}
}

async function fetchAIZone(data){
  const el=document.getElementById('ai-zone-placeholder');
  if(!el)return;
  try{
    const res=await fetch('/api/ai-zone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const bz=await res.json();
    if(!res.ok)throw new Error(bz.error||'AI 分析失敗');
    el.outerHTML=renderBuyZoneHTML(bz);
  }catch(e){
    if(el)el.innerHTML=`<div style="padding:12px;color:var(--text2);font-size:12px">市場資料已取得，但 AI 技術面評估暫時不可用：${e.message}</div>`;
  }
}

async function fetchNews(data){
  const el=document.getElementById('news-placeholder');
  if(!el)return;
  try{
    const params=new URLSearchParams({stock_id:data.stock_id,name:data.name||data.stock_id,market:data.market||'tw'});
    const res=await fetch('/api/news?'+params);
    const json=await res.json();
    if(!res.ok)throw new Error(json.error||'新聞載入失敗');
    el.outerHTML=renderNewsHTML(json.articles||[],data.market==='us');
  }catch(e){
    if(el)el.innerHTML=`<div class="news-empty">新聞暫時無法載入：${e.message}</div>`;
  }
}

// ★ 統一千分位格式
function fmt(n,dec=2){
  if(n==null)return'—';
  return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtVol(v){
  if(!v)return'—';
  if(v>=1e9)return(v/1e9).toFixed(1)+'B';
  if(v>=1e8)return(v/1e8).toFixed(1)+' 億';
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e4)return(v/1e4).toFixed(1)+' 萬';
  return v.toLocaleString();
}

function renderBuyZoneHTML(bz){
  const eqClass={excellent:'eq-excellent',good:'eq-good',fair:'eq-fair',poor:'eq-poor'}[bz.entry_quality]||'eq-fair';
  const riskClass={low:'risk-low',medium:'risk-medium',high:'risk-high'}[bz.risk]||'risk-medium';
  const riskLabel={low:'低風險參考',medium:'中等風險參考',high:'較高風險參考'}[bz.risk]||'';
  const verdictColor={buy:'var(--green)',watch:'var(--yellow)',avoid:'var(--red)'}[bz.verdict]||'var(--text2)';
  const verdictIcon={buy:'🟢',watch:'🟡',avoid:'🔴'}[bz.verdict]||'⚪';
  const scoreColor=bz.score>=70?'var(--green)':bz.score>=50?'var(--yellow)':'var(--red)';
  const waitHtml=bz.wait_for?`<div class="bz-wait">⏳ 觀察條件：${bz.wait_for}</div>`:'';
  const biasWarnHtml=bz.bias_warning?`<div class="bz-bias-warn">🚨 ${bz.bias_warning}</div>`:'';
  const checklistHtml=(bz.checklist||[]).map(c=>{
    const icon={pass:'✅',warn:'⚠️',fail:'❌'}[c.status]||'•';
    return `<div class="cl-item"><span class="cl-icon">${icon}</span><span class="cl-name">${c.item}</span><span class="cl-note">${c.note||''}</span></div>`;
  }).join('');
  const risksHtml=(bz.risk_factors||[]).map(r=>`<div class="factor-item risk-item">⚠️ ${r}</div>`).join('');
  const catsHtml=(bz.catalysts||[]).map(c=>`<div class="factor-item cat-item">✨ ${c}</div>`).join('');

  return `<div class="buy-zone-card">
    <div class="bz-header"><span class="ai-badge">AI</span><span class="bz-title">中長期技術面評估</span><span class="entry-quality ${eqClass}">${bz.entry_label||''}</span></div>
    <div class="verdict-row">
      <div class="verdict-main"><span class="verdict-icon">${verdictIcon}</span><span class="verdict-label" style="color:${verdictColor}">${bz.verdict_label||''}</span></div>
      <div class="verdict-score"><span class="score-num" style="color:${scoreColor}">${bz.score}</span><span class="score-label">/ 100</span></div>
    </div>
    ${biasWarnHtml}
    <div class="bz-grid">
      <div class="bz-item buy"><label>觀察區間（參考）</label><span>${fmt(bz.buy_low)} – ${fmt(bz.buy_high)}</span></div>
      <div class="bz-item stop"><label>風險控管參考</label><span>${fmt(bz.stop_loss)}</span></div>
      <div class="bz-item t6"><label>6 個月情境價</label><span>${fmt(bz.target_6m)}</span></div>
      <div class="bz-item t12"><label>12 個月情境價</label><span>${fmt(bz.target_12m)}</span></div>
    </div>
    ${checklistHtml?`<div class="checklist-title">操作檢查清單</div><div class="checklist">${checklistHtml}</div>`:''}
    <div class="bz-strategy">📋 ${bz.strategy}</div>
    <div class="bz-reason">💡 ${bz.reason}</div>
    ${waitHtml}
    ${risksHtml||catsHtml?`<div class="factors-grid">${risksHtml?`<div class="factors-col">${risksHtml}</div>`:''  }${catsHtml?`<div class="factors-col">${catsHtml}</div>`:''}</div>`:''}
    <span class="risk-badge ${riskClass}">風險評估：${riskLabel}</span>
  </div>`;
}

function renderNewsHTML(articles,isUSMarket){
  if(!articles.length)return`<div class="news-card"><div class="section-title">最新新聞輿情</div><div class="news-empty">近期無相關新聞</div></div>`;
  const items=articles.map(a=>{
    let pubStr='日期未知';
    if(a.published){
      try{
        const d=new Date(a.published);
        if(!isNaN(d)){
          const now=new Date();
          const diff=Math.floor((now-d)/86400000);
          if(diff===0)pubStr='今天';
          else if(diff===1)pubStr='昨天';
          else if(diff<7)pubStr=diff+'天前';
          else pubStr=d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
        }
      }catch(_){}
    }
    return`<div class="news-item">
      <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
      <div class="news-meta">
        <span class="news-source">${a.source}</span>
        <span class="news-date">${pubStr}</span>
      </div>
      ${a.snippet?`<div class="news-snippet">${a.snippet}</div>`:''}
    </div>`;
  }).join('');
  return`<div class="news-card"><div class="section-title">最新新聞輿情（近14日，最新優先）</div><div class="news-list">${items}</div></div>`;
}

function renderResult(d){
  const p=d.price,ind=d.indicators,sig=d.signal;
  const us=d.market==='us';
  const cur=d.currency||(us?'USD':'TWD');
  const upC=us?'us-up':'up', downC=us?'us-down':'down';
  const cc=p.change_percent>0?upC:p.change_percent<0?downC:'flat';
  const cs=p.change_percent>0?'+':'';
  const sigColor={bullish:'var(--accent)',bearish:'var(--text2)',neutral:'var(--yellow)'}[sig.overall];

  // ★ 均線位置標籤（不含數字，數字已在 ma_position 裡）
  const maTags=(ind.ma_position||[]).map(t=>{
    const above=t.startsWith('站上');
    return`<span class="ma-tag ${above?'above':'below'}">${t}</span>`;
  }).join('');

  const macdColor=ind.macd_hist>0?'var(--accent)':'var(--text2)';
  const monthKColor=ind.month_k<30?'var(--accent)':ind.month_k>70?'var(--yellow)':'var(--text)';

  // 估值
  let valHtml='';
  if(d.valuation&&(d.valuation.per||d.valuation.yield)){
    const v=d.valuation;
    valHtml=`<div class="card"><div class="section-title">估值指標（${v.date||''}）</div>
      <div class="val-grid">
        <div class="val-item"><label>本益比 P/E</label>${v.per!=null?`<span>${v.per}x</span>`:`<span class="val-na">暫無資料</span>`}</div>
        ${v.pbr!=null?`<div class="val-item"><label>股價淨值比 P/B</label><span>${v.pbr}x</span></div>`:''}
        <div class="val-item"><label>殖利率</label>${v.yield!=null?`<span>${v.yield}%</span>`:`<span class="val-na">暫無資料</span>`}</div>
      </div></div>`;
  }

  // ★ 月營收：YoY 顯示「暫無資料」而非 —
  let revHtml='';
  if(d.monthly_revenue){
    const r=d.monthly_revenue;
    const yoyVal=r.yoy!=null?(r.yoy>0?'+':'')+fmt(r.yoy)+'%':`<span class="rev-na">暫無資料</span>`;
    const momVal=r.mom!=null?(r.mom>0?'+':'')+fmt(r.mom)+'%':`<span class="rev-na">暫無資料</span>`;
    revHtml=`<div class="card"><div class="section-title">月營收（${r.date.slice(0,7)}）</div>
      <div class="rev-grid">
        <div class="rev-item"><label>當月營收</label><span>${fmtVol(r.revenue)}</span></div>
        <div class="rev-item"><label>年增率 YoY</label><span class="${r.yoy>0?'up':r.yoy<0?'down':''}">${yoyVal}</span></div>
        <div class="rev-item"><label>月增率 MoM</label><span class="${r.mom>0?'up':r.mom<0?'down':''}">${momVal}</span></div>
      </div></div>`;
  }

  // 圖表資料筆數提示
  const histCount=d.history?d.history.length:0;
  // chart note handled in drawPriceChart

  document.getElementById('result').innerHTML=`
    <!-- 股價主卡：含資料日期與非即時提示 -->
    <div class="card">
      <div class="price-header">
        <span class="stock-name">${d.name}</span>
        <span class="stock-id">${d.stock_id}</span>
        <span class="market-badge ${us?'us':'tw'}">${us?'🇺🇸 美股':'🇹🇼 台股'}</span>
      </div>
      <div class="price-main ${cc}">${fmt(p.close)}<span class="currency-tag">${cur}</span></div>
      <div class="price-change ${cc}">${p.change_percent!=null?cs+fmt(p.change_percent)+'%':''}</div>
      <div class="data-note">資料日期：${d.updated}｜${d.data_note||'可能非即時報價'}</div>
      <div class="price-meta">
        <div class="meta-item"><label>開盤</label><span>${fmt(p.open)}</span></div>
        <div class="meta-item"><label>最高</label><span class="${upC}">${fmt(p.high)}</span></div>
        <div class="meta-item"><label>最低</label><span class="${downC}">${fmt(p.low)}</span></div>
        <div class="meta-item"><label>成交量</label><span>${fmtVol(p.volume)}</span></div>
        <div class="meta-item"><label>52週高</label><span>${fmt(ind.high_52w)}</span></div>
        <div class="meta-item"><label>52週低</label><span>${fmt(ind.low_52w)}</span></div>
      </div>
    </div>

    <!-- 均線 -->
    <div class="card">
      <div class="section-title">均線位置（月線MA20 / 季線MA60 / 半年線MA120 / 年線MA240）</div>
      <div class="ind-grid">
        <div class="ind-item"><label>月線 MA20</label><span>${fmt(ind.ma20)}</span></div>
        <div class="ind-item"><label>季線 MA60</label><span>${fmt(ind.ma60)}</span></div>
        <div class="ind-item"><label>半年線 MA120</label><span>${fmt(ind.ma120)}</span></div>
        <div class="ind-item"><label>年線 MA240</label><span>${fmt(ind.ma240)}</span></div>
      </div>
      <div class="ma-position">${maTags}</div>
    </div>

    <!-- 動能指標 -->
    <div class="card">
      <div class="section-title">動能指標</div>
      <div class="ind-grid">
        <div class="ind-item"><label>MACD 柱狀</label><span style="color:${macdColor}">${fmt(ind.macd_hist)}</span><div class="sub">DIF ${fmt(ind.macd_line)} / DEA ${fmt(ind.macd_signal)}</div></div>
        <div class="ind-item"><label>月 KD</label><span style="color:${monthKColor}">K ${ind.month_k!=null?fmt(ind.month_k,1):'—'}</span><div class="sub">D ${ind.month_d!=null?fmt(ind.month_d,1):'—'}</div></div>
        <div class="ind-item"><label>RSI(14)</label><span style="color:${ind.rsi<40?'var(--accent)':ind.rsi>70?'var(--yellow)':'var(--text)'}">${fmt(ind.rsi)}</span></div>
      </div>
    </div>

    <!-- 訊號 -->
    <div class="card signal-card ${sig.overall}">
      <div class="section-title">中長期綜合技術訊號</div>
      <div class="signal-score"><span class="score-bull">多方 ${sig.bullScore}</span><span class="score-bear">空方 ${sig.bearScore}</span></div>
      <div class="signal-summary" style="color:${sigColor}">${sig.summary}</div>
      <div class="signal-items">${sig.signals.map(s=>`<div class="signal-item sig-${s.type}"><span class="signal-dot"></span><span>${s.text}</span></div>`).join('')}</div>
    </div>

    <!-- AI 評估（非同步） -->
    <div class="buy-zone-card" id="ai-zone-placeholder">
      <div class="bz-header"><span class="ai-badge">AI</span><span class="bz-title">中長期技術面評估</span></div>
      <div class="ai-loading">AI 正在進行技術面風險評估…</div>
    </div>

    <!-- 新聞（非同步） -->
    <div class="news-card" id="news-placeholder">
      <div class="section-title">最新新聞輿情</div>
      <div class="news-loading">正在搜尋最新相關新聞…</div>
    </div>

    ${valHtml}

    <!-- 走勢圖 -->
    <div class="card">
      <div class="section-title">近60日走勢（收盤價 + MA20 / MA60 / MA240）</div>
      <div class="chart-area"><canvas id="priceChart"></canvas></div>
      <div id="chart-note" class="chart-info"></div>
    </div>

    <!-- MACD 圖 -->
    <div class="card">
      <div class="section-title">MACD（近60日）</div>
      <div class="chart-area small"><canvas id="macdChart"></canvas></div>
    </div>

    ${revHtml}
    <div class="updated-tag">資料日期：${d.updated}｜${d.data_note||''}</div>`;

  loadChartJS(()=>{drawPriceChart(d.history);drawMacdChart(d.history);});
}

function loadChartJS(cb){if(window.Chart)return cb();const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';s.onload=cb;document.head.appendChild(s);}

function drawPriceChart(h){
  const ctx=document.getElementById('priceChart');if(!ctx||!h||!h.length)return;
  // 只取有效收盤價的點，X 軸自動 fit 實際資料範圍
  const valid=h.filter(d=>d.close!=null&&d.close>0);
  if(!valid.length)return;
  const labels=valid.map(d=>d.date.slice(5));
  const n=valid.length;
  // 更新資料筆數顯示
  const noteEl=document.getElementById('chart-note');
  if(noteEl)noteEl.textContent=n<55?`目前取得 ${n} 筆資料`:'';
  priceChart=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:'收盤價',data:valid.map(d=>d.close),borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,.07)',borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:false},
    {label:'MA20',data:valid.map(d=>d.ma20??null),borderColor:'#ffd740',borderWidth:1.5,fill:false,tension:.3,pointRadius:0,spanGaps:false},
    {label:'MA60',data:valid.map(d=>d.ma60??null),borderColor:'#ff9100',borderWidth:1.5,fill:false,tension:.3,pointRadius:0,spanGaps:false},
    {label:'MA240',data:valid.map(d=>d.ma240??null),borderColor:'#cc44ff',borderWidth:1.5,fill:false,tension:.3,pointRadius:0,spanGaps:false},
  ]},options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:12,padding:10}},
      tooltip:{backgroundColor:'#1a2235',borderColor:'#1e2d45',borderWidth:1,titleColor:'#94a3b8',bodyColor:'#e2e8f0',
        callbacks:{label:c=>c.raw!=null?`${c.dataset.label}: ${fmt(c.raw)}`:null,
          filter:i=>i.raw!=null}}},
    scales:{
      x:{ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:8,maxRotation:0},
         grid:{color:'rgba(255,255,255,.04)'}},
      y:{position:'right',
         ticks:{color:'#94a3b8',font:{size:10,family:'JetBrains Mono'},callback:v=>fmt(v,0)},
         grid:{color:'rgba(255,255,255,.04)'}}}}});
}

function drawMacdChart(h){
  const ctx=document.getElementById('macdChart');if(!ctx||!h||!h.length)return;
  const valid=h.filter(d=>d.close!=null&&d.close>0);
  if(!valid.length)return;
  const labels=valid.map(d=>d.date.slice(5));
  macdChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'MACD柱',data:valid.map(d=>d.macd_hist??null),
     backgroundColor:valid.map(d=>(d.macd_hist||0)>0?'rgba(0,212,255,.6)':'rgba(148,163,184,.5)'),
     borderWidth:0},
    {label:'DIF',data:valid.map(d=>d.macd??null),type:'line',borderColor:'#00d4ff',borderWidth:1.5,fill:false,pointRadius:0,tension:.3,spanGaps:false},
    {label:'DEA',data:valid.map(d=>d.macd_signal??null),type:'line',borderColor:'#ffd740',borderWidth:1.5,fill:false,pointRadius:0,tension:.3,spanGaps:false},
  ]},options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:10,padding:10}},
      tooltip:{backgroundColor:'#1a2235',borderColor:'#1e2d45',borderWidth:1,titleColor:'#94a3b8',bodyColor:'#e2e8f0',
        callbacks:{filter:i=>i.raw!=null}}},
    scales:{
      x:{ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:8,maxRotation:0},
         grid:{color:'rgba(255,255,255,.04)'}},
      y:{position:'right',ticks:{color:'#94a3b8',font:{size:9,family:'JetBrains Mono'}},
         grid:{color:'rgba(255,255,255,.04)'}}}}});
}
</script>
